<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rich Preview</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" />
<style>
  :root { color-scheme: light dark; --bg: #0d1117; --panel: #161b22; --border: #30363d; --fg: #e6edf3; --dim: #8b949e; --accent: #58a6ff; }
  @media (prefers-color-scheme: light) { :root { --bg: #ffffff; --panel: #f6f8fa; --border: #d0d7de; --fg: #1f2328; --dim: #656d76; --accent: #0969da; } }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.6 -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--fg); display: flex; height: 100vh; }
  #sidebar { width: 300px; min-width: 220px; border-right: 1px solid var(--border); background: var(--panel); overflow-y: auto; padding: 12px; }
  #sidebar h1 { font-size: 13px; margin: 0 0 4px; }
  #branch { color: var(--dim); font-size: 12px; margin-bottom: 12px; word-break: break-all; }
  .file { display: flex; gap: 8px; align-items: baseline; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; word-break: break-all; }
  .file:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .file.active { background: color-mix(in srgb, var(--accent) 20%, transparent); }
  .status { font-family: ui-monospace, monospace; font-size: 11px; width: 14px; flex: none; }
  .status.M { color: #d29922; } .status.A, .status\? { color: #3fb950; } .status.D { color: #f85149; }
  #main { flex: 1; overflow: auto; padding: 24px 32px; }
  #content { max-width: 920px; margin: 0 auto; }
  #content img { max-width: 100%; }
  iframe.embed { width: 100%; height: calc(100vh - 100px); border: 1px solid var(--border); border-radius: 8px; background: #fff; }
  pre { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; }
  code { font-family: ui-monospace, "SF Mono", monospace; font-size: 12.5px; }
  .md table { border-collapse: collapse; } .md th, .md td { border: 1px solid var(--border); padding: 4px 10px; }
  .md blockquote { border-left: 3px solid var(--border); margin-left: 0; padding-left: 14px; color: var(--dim); }
  .md a { color: var(--accent); }
  .error { color: #f85149; }
  .empty { color: var(--dim); margin-top: 40vh; text-align: center; }
  .mermaid-box, .svg-box { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow: auto; }
</style>
</head>
<body>
<nav id="sidebar">
  <h1>Touched files</h1>
  <div id="branch"></div>
  <div id="files"></div>
</nav>
<main id="main"><div id="content"><div class="empty">Loading…</div></div></main>

<script type="module">
import { marked } from "https://cdn.jsdelivr.net/npm/marked@12/+esm"
import DOMPurify from "https://cdn.jsdelivr.net/npm/dompurify@3/+esm"
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/+esm"
import hljs from "https://cdn.jsdelivr.net/npm/highlight.js@11/+esm"

const params = new URLSearchParams(location.search)
const token = params.get("t")
const root = params.get("root")
const api = (path, extra = "") => fetch(`/api/${path}?t=${token}&root=${encodeURIComponent(root)}${extra}`).then(r => r.json())

mermaid.initialize({ startOnLoad: false, theme: matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "default" })

let activePath = params.get("file") || null
let activeMtime = 0

function renderMarkdown(el, content) {
  const html = DOMPurify.sanitize(marked.parse(content))
  el.innerHTML = `<div class="md">${html}</div>`
  el.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b))
  // Render ```mermaid fences inside markdown, like Shuttle does.
  el.querySelectorAll("code.language-mermaid").forEach(async (block, i) => {
    try {
      const { svg } = await mermaid.render(`mmd-inline-${Date.now()}-${i}`, block.textContent)
      const box = document.createElement("div")
      box.className = "mermaid-box"
      box.innerHTML = svg
      block.closest("pre").replaceWith(box)
    } catch { /* leave the fence as code */ }
  })
}

async function renderFile(file) {
  const el = document.getElementById("content")
  const { renderer, content, encoding, mimeType, d2, error } = file
  if (error) { el.innerHTML = `<div class="error">${error}</div>`; return }

  if (renderer.kind === "markdown") return renderMarkdown(el, content)

  if (renderer.kind === "image") {
    el.innerHTML = `<img src="data:${mimeType};base64,${content}" alt="" />`
    return
  }

  if (renderer.kind === "embed") {
    if (renderer.format === "html") {
      const frame = document.createElement("iframe")
      frame.className = "embed"
      frame.sandbox = "allow-scripts"
      frame.srcdoc = content
      el.replaceChildren(frame)
      return
    }
    if (renderer.format === "svg") {
      el.innerHTML = `<div class="svg-box"><img src="data:image/svg+xml;charset=utf-8,${encodeURIComponent(content)}" alt="" /></div>`
      return
    }
    if (renderer.format === "mermaid") {
      try {
        const { svg } = await mermaid.render(`mmd-${Date.now()}`, content)
        el.innerHTML = `<div class="mermaid-box">${svg}</div>`
      } catch (e) {
        el.innerHTML = `<div class="error">${e.message}</div><pre><code>${escapeHtml(content)}</code></pre>`
      }
      return
    }
    if (renderer.format === "d2") {
      if (d2?.ok) { el.innerHTML = `<div class="svg-box">${d2.svg}</div>`; return }
      el.innerHTML = `<div class="error">D2 render unavailable (${d2?.error ?? "install the d2 CLI on the herdr host"})</div><pre><code>${escapeHtml(content)}</code></pre>`
      return
    }
  }

  if (renderer.kind === "unsupported") {
    el.innerHTML = `<div class="empty">No preview for this file type.</div>`
    return
  }

  const lang = renderer.language ? ` class="language-${renderer.language}"` : ""
  el.innerHTML = `<pre><code${lang}>${escapeHtml(content)}</code></pre>`
  el.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b))
}

function escapeHtml(s) {
  return s.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
}

async function openFile(path) {
  activePath = path
  document.querySelectorAll(".file").forEach(n => n.classList.toggle("active", n.dataset.path === path))
  const file = await api("file", `&path=${encodeURIComponent(path)}`)
  activeMtime = file.mtime ?? 0
  await renderFile(file)
}

async function refreshList() {
  const { files, branch } = await api("files")
  document.getElementById("branch").textContent = `${root.split("/").pop()} · ${branch ?? "no branch"}`
  const list = document.getElementById("files")
  list.replaceChildren(...files.map(f => {
    const row = document.createElement("div")
    row.className = "file" + (f.path === activePath ? " active" : "")
    row.dataset.path = f.path
    row.innerHTML = `<span class="status ${f.status[0]}">${f.status[0]}</span><span>${f.path}</span>`
    row.onclick = () => openFile(f.path)
    return row
  }))
  if (!activePath && files.length) openFile(files[0].path)
  else if (!files.length) document.getElementById("content").innerHTML = `<div class="empty">No files touched in this session yet.</div>`
}

// Live-follow the agent: poll the list and re-render the open file when it changes.
async function pollActive() {
  if (!activePath) return
  const file = await api("file", `&path=${encodeURIComponent(activePath)}`)
  if (file.mtime && file.mtime !== activeMtime) {
    activeMtime = file.mtime
    await renderFile(file)
  }
}

await refreshList()
if (activePath) openFile(activePath)
setInterval(refreshList, 3000)
setInterval(pollActive, 2000)
</script>
</body>
</html>
